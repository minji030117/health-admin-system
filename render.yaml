services:
  - type: web
    name: health-admin-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: health-admin-db
          property: connectionString
      - key: JWT_SECRET
        value: healthtrafficlight2026secret
      - key: NODE_ENV
        value: production

databases:
  - name: health-admin-db
    databaseName: health_admin
    user: health_admin
